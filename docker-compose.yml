services:
  postgres:
    image: postgres:16-alpine
    container_name: reservas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_reservas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - reservas-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_reservas"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reservas-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sistema_reservas
      APP_URL: http://localhost:3000
      AUTH_SECRET: docker-local-change-me-32-characters-minimum
      AUTH_COOKIE_SECURE: "false"
      STAFF_DEMO_PASSWORD: admin123
      JOBS_SECRET: docker-local-jobs-secret
      EMAIL_FROM: Reservas <reservas@example.com>
      EMAIL_PROVIDER: console
      ENABLE_PG_BOSS: "false"
      SEED_DEMO: "true"
      RESET_DEMO: "false"
      SUPER_ADMIN_EMAIL: owner@mesa-clara.test
      SUPER_ADMIN_PASSWORD: superadmin123
      SUPER_ADMIN_NAME: Mesa Clara Owner
      MP_ACCESS_TOKEN: ""
      MP_WEBHOOK_SECRET: ""
      MP_CURRENCY_ID: ARS
      MP_PLAN_STARTER_AMOUNT: "29000"
      MP_PLAN_GROWTH_AMOUNT: "69000"
      MP_PLAN_SCALE_AMOUNT: "149000"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      WHATSAPP_AI_PROVIDER: ${WHATSAPP_AI_PROVIDER:-openai}
      WHATSAPP_AI_MODEL: ${WHATSAPP_AI_MODEL:-gpt-4o-mini}
      WHATSAPP_PROVIDER: console
      WHATSAPP_API_VERSION: v23.0
      WHATSAPP_ACCESS_TOKEN: ""
      WHATSAPP_PHONE_NUMBER_ID: "demo-phone-number-id"
      WHATSAPP_APP_SECRET: ""
      WHATSAPP_VERIFY_TOKEN: docker-whatsapp-verify
      WHATSAPP_DEFAULT_RESTAURANT_SLUG: demo-bistro
      WHATSAPP_ENABLE_NOTIFICATIONS: "true"
      WHATSAPP_TEMPLATE_CONFIRMATION: ""
      WHATSAPP_TEMPLATE_REMINDER: ""
      WHATSAPP_TEMPLATE_LANGUAGE: es_AR
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  reservas-postgres-data:
